run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (net/http.ResponseWriter).Write

issues:
  exclude-rules:
    # Exclude errcheck in test files - test helpers often ignore errors intentionally
    - path: _test\.go
      linters:
        - errcheck
    # Exclude unused in test files - test helpers may be defined for future use
    - path: _test\.go
      linters:
        - unused
