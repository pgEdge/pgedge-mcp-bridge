# MCP HTTP Bridge - TLS Configuration
# This configuration demonstrates TLS setup for secure connections.
#
# TLS options include:
# - Server TLS for HTTPS
# - Mutual TLS (mTLS) with client certificates
# - Custom CA certificates

# Mode of operation
mode: server

# Server configuration
server:
  # Listen address for HTTPS
  # Port 8443 is commonly used for HTTPS alternative port
  listen: ":8443"

  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

  # TLS configuration for the server
  tls:
    # Enable TLS
    enabled: true

    # Server certificate file path
    # This certificate is presented to clients
    # Should be a PEM-encoded certificate file
    cert_file: "/etc/pgedge/tls/server.crt"

    # Server private key file path
    # Must match the certificate
    # Should be a PEM-encoded private key file
    key_file: "/etc/pgedge/tls/server.key"

    # Client CA certificate file (for mTLS)
    # When specified with client_auth: "verify", the server will require
    # and verify client certificates signed by this CA
    client_ca: "/etc/pgedge/tls/client-ca.crt"

    # Client authentication policy
    # Options:
    #   - "none": No client certificate required
    #   - "request": Request but don't require client certificate
    #   - "require": Require client certificate but don't verify
    #   - "verify": Require and verify client certificate (mTLS)
    client_auth: "verify"

    # Minimum TLS version
    # Options: "1.2", "1.3"
    # Recommended: "1.2" minimum for security
    min_version: "1.2"

  # MCP server configuration
  mcp_server:
    command: "/usr/local/bin/mcp-server"
    args:
      - "--secure"
    env:
      MCP_LOG_LEVEL: "info"
    graceful_shutdown_timeout: 5s

  # Authentication (can be combined with mTLS)
  auth:
    # With mTLS, you might use client certificate CN as identity
    # Or combine with bearer/OAuth for additional security
    type: bearer
    bearer:
      valid_tokens:
        - "${MCP_AUTH_TOKEN}"

  # Session management
  session:
    enabled: true
    timeout: 30m
    max_sessions: 100

  # CORS configuration
  # Note: When using mTLS from browsers, CORS needs special consideration
  cors:
    enabled: true
    allowed_origins:
      - "https://secure.example.com"
    allowed_methods:
      - "GET"
      - "POST"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Authorization"
      - "Content-Type"
      - "Mcp-Session-Id"
    allow_credentials: true
    max_age: 3600

# Logging configuration
log:
  level: info
  format: json
  output: stderr

# ---
# TLS Certificate Generation Examples:
#
# Generate a self-signed CA certificate:
#   openssl genrsa -out ca.key 4096
#   openssl req -new -x509 -days 365 -key ca.key -out ca.crt \
#     -subj "/CN=MCP Bridge CA"
#
# Generate server certificate signed by CA:
#   openssl genrsa -out server.key 2048
#   openssl req -new -key server.key -out server.csr \
#     -subj "/CN=mcp.example.com"
#   openssl x509 -req -days 365 -in server.csr -CA ca.crt -CAkey ca.key \
#     -CAcreateserial -out server.crt \
#     -extfile <(printf "subjectAltName=DNS:mcp.example.com,DNS:localhost,IP:127.0.0.1")
#
# Generate client certificate for mTLS:
#   openssl genrsa -out client.key 2048
#   openssl req -new -key client.key -out client.csr \
#     -subj "/CN=mcp-client"
#   openssl x509 -req -days 365 -in client.csr -CA ca.crt -CAkey ca.key \
#     -CAcreateserial -out client.crt
